name: Build and Deploy

on:
  push:
    branches: [master]
    paths:
      - '6/6.2/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./6/6.2
          push: true
          tags: ghcr.io/${{ github.actor }}/html-openshift-app:v${{ github.run_number }}

      - name: Deploy to AppuIO
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-client-linux.tar.gz
          tar -xf openshift-client-linux.tar.gz
          ./oc login ${{ secrets.OPENSHIFT_SERVER }} --token=${{ secrets.OPENSHIFT_TOKEN }} --insecure-skip-tls-verify
          ./oc set image deployment/html-openshift-app html-openshift-app=ghcr.io/${{ github.actor }}/html-openshift-app:v${{ github.run_number }} -n ${{ secrets.OPENSHIFT_NAMESPACE }}
