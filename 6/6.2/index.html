<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Webseite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }


        .card {
            background: white;
            border-radius: 12px;
            padding: 48px 56px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 480px;
            width: 90%;
        }


        .badge {
            display: inline-block;
            background: #e0f2fe;
            color: #0369a1;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 999px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            color: #1e293b;
            margin-bottom: 12px;
        }

        p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .info {
            display: flex;
            justify-content: center;
            gap: 32px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #94a3b8;
            font-weight: 600;
        }

        .info-value {
            font-size: 0.95rem;
            color: #334155;
            font-weight: 500;
        }

        .divider {
            width: 1px;
            background: #e2e8f0;
            align-self: stretch;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="badge">OpenShift + nginx</span>
        <h1>Hallo, Welt!</h1>
        <p>Diese Seite wird von einem <strong>nginx-unprivileged</strong>-Container ausgeliefert,
           deployed auf <strong>AppuIO OpenShift</strong> via GitHub Actions.</p>
        <div class="info">
            <div class="info-item">
                <span class="info-label">Image</span>
                <span class="info-value">nginx-unprivileged</span>
            </div>
            <div class="divider"></div>
            <div class="info-item">
                <span class="info-label">Port</span>
                <span class="info-value">8080</span>
            </div>
            <div class="divider"></div>
            <div class="info-item">
                <span class="info-label">Modul</span>
                <span class="info-value">BZZ 210 – 6.2</span>
            </div>
        </div>
    </div>
</body>
</html>
